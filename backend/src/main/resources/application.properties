spring.application.name=backend

# Disable Docker Compose integration for now
spring.docker.compose.enabled=false

# =========================
# Template Configuration
# =========================
devhub.templates.path=../templates

# =========================
# PostgreSQL Configuration
# =========================
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/devhub}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

# =========================
# JPA / Hibernate
# =========================
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# =========================
# Flyway
# =========================
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

# =========================
# JWT Configuration
# =========================
jwt.secret=${JWT_SECRET:your-local-development-secret-key-change-this}
jwt.access-token-expiration=${JWT_ACCESS_TOKEN_EXPIRATION:900000}
jwt.refresh-token-expiration=${JWT_REFRESH_TOKEN_EXPIRATION:604800000}
jwt.issuer=${JWT_ISSUER:DevHub}

# =========================
# Server
# =========================
server.port=${PORT:8080}