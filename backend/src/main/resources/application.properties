spring.application.name=backend

# Disable Docker Compose integration for now
spring.docker.compose.enabled=false

# =========================
# PostgreSQL Configuration
# =========================
spring.datasource.url=jdbc:postgresql://localhost:5432/devhub
spring.datasource.username=postgres
spring.datasource.password=your@24#
spring.datasource.driver-class-name=org.postgresql.Driver

# =========================
# JPA / Hibernate
# =========================
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# =========================
# Flyway
# =========================
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

# JWT Configuration
jwt.secret=ThisIsMyVeryLongSecretKeyForDevHubJwtAuthenticationModule2026
jwt.access-token-expiration=3600000
jwt.refresh-token-expiration=604800000
jwt.issuer=devhub

# =========================
# Server
# =========================
server.port=8080